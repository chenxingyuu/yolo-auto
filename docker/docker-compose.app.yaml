services:
  mcp:
    image: registry.cn-hangzhou.aliyuncs.com/daxx/yolo-auto-app:latest
    restart: unless-stopped
    ports:
      - "8321:8321"
    env_file: .env
    environment:
      # MCP HTTP transport (Streamable HTTP)
      MCP_TRANSPORT: http
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8321"
      MCP_PATH: /mcp/

      # Shared state file for jobs
      YOLO_STATE_FILE: /data/state/jobs.db
      YOLO_WATCH_LOCK_FILE: /data/state/watch.lock
      YOLO_WATCH_POLL_INTERVAL_SECONDS: "30"

      # HTTP 控制面配置（训练容器）
      YOLO_CONTROL_BASE_URL: http://yolo-auto:18080
      YOLO_CONTROL_BEARER_TOKEN: ""
      YOLO_CONTROL_TIMEOUT_SECONDS: "30"
    volumes:
      - state-data:/data/state
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8321/health"]
      interval: 10s
      timeout: 3s
      retries: 10

  worker:
    image: registry.cn-hangzhou.aliyuncs.com/daxx/yolo-auto-app:latest
    restart: unless-stopped
    command: ["uv", "run", "yolo-auto-watch"]
    env_file: .env
    environment:
      YOLO_STATE_FILE: /data/state/jobs.db
      YOLO_WATCH_LOCK_FILE: /data/state/watch.lock
      YOLO_WATCH_POLL_INTERVAL_SECONDS: "30"

      YOLO_CONTROL_BASE_URL: http://yolo-auto:18080
      YOLO_CONTROL_BEARER_TOKEN: ""
      YOLO_CONTROL_TIMEOUT_SECONDS: "30"
    volumes:
      - state-data:/data/state

  mlflow-ui:
    image: registry.cn-hangzhou.aliyuncs.com/daxx/yolo-auto-app:latest
    restart: unless-stopped
    env_file: .env
    # 提供独立 MLflow Tracking/UI，供 Ultralytics 原生集成写入
    command:
      [
        "uv",
        "run",
        "--no-sync",
        "mlflow",
        "server",
        "--backend-store-uri",
        "sqlite:////data/mlflow/mlflow.db",
        "--default-artifact-root",
        "file:///data/mlflow/artifacts",
        "--host",
        "0.0.0.0",
        "--port",
        "5001",
        "--cors-allowed-origins",
        "*",
      ]
    ports:
      - "5001:5001"
    volumes:
      - mlflow-data:/data/mlflow

volumes:
  state-data:
    driver: local
  mlflow-data:
    driver: local

