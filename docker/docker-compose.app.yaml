services:
  mcp:
    image: registry.cn-hangzhou.aliyuncs.com/daxx/yolo-auto-app:latest
    restart: unless-stopped
    ports:
      - "8321:8321"
    env_file: .env
    environment:
      # MCP HTTP transport (Streamable HTTP)
      MCP_TRANSPORT: http
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8321"
      MCP_PATH: /mcp/

      # Shared state file for jobs
      YOLO_STATE_FILE: /data/state/jobs.db
      YOLO_WATCH_LOCK_FILE: /data/state/watch.lock
      YOLO_WATCH_POLL_INTERVAL_SECONDS: "30"

      # You should override these via an env file or environment:
      # - FEISHU_WEBHOOK_URL
      # - YOLO_SSH_ENVS or YOLO_SSH_HOST/PORT/USER/KEY_PATH
      YOLO_SSH_KEY_PATH: /run/secrets/yolo_ssh_key
    volumes:
      - state-data:/data/state
    secrets:
      - yolo_ssh_key
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8321/health"]
      interval: 10s
      timeout: 3s
      retries: 10

  worker:
    image: registry.cn-hangzhou.aliyuncs.com/daxx/yolo-auto-app:latest
    restart: unless-stopped
    command: ["uv", "run", "yolo-auto-watch"]
    env_file: .env
    environment:
      YOLO_STATE_FILE: /data/state/jobs.db
      YOLO_WATCH_LOCK_FILE: /data/state/watch.lock
      YOLO_WATCH_POLL_INTERVAL_SECONDS: "30"

      YOLO_SSH_KEY_PATH: /run/secrets/yolo_ssh_key
    volumes:
      - state-data:/data/state
    secrets:
      - yolo_ssh_key

  mlflow-ui:
    image: registry.cn-hangzhou.aliyuncs.com/daxx/yolo-auto-app:latest
    restart: unless-stopped
    env_file: .env
    # 提供独立 MLflow Tracking/UI，供 Ultralytics 原生集成写入
    command:
      [
        "uvx",
        "--from",
        "mlflow==3.11.1",
        "mlflow",
        "server",
        "--backend-store-uri",
        "sqlite:////data/mlflow/mlflow.db",
        "--default-artifact-root",
        "file:///data/mlflow/artifacts",
        "--host",
        "0.0.0.0",
        "--port",
        "5001",
        "--cors-allowed-origins",
        "*",
      ]
    ports:
      - "5001:5001"
    volumes:
      - mlflow-data:/data/mlflow

volumes:
  state-data:
    driver: local
  mlflow-data:
    driver: local

secrets:
  # Create file at docker/secrets/yolo_ssh_key (or override with your own path).
  yolo_ssh_key:
    file: ./secrets/id_rsa
