services:
  mcp:
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
    image: yolo-auto-app:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # MCP HTTP transport (Streamable HTTP)
      MCP_TRANSPORT: http
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8000"
      MCP_PATH: /mcp/

      # Shared state file for jobs
      YOLO_STATE_FILE: /data/state/jobs.json
      YOLO_WATCH_LOCK_FILE: /data/state/watch.lock
      YOLO_WATCH_POLL_INTERVAL_SECONDS: "30"

      # MLflow: sqlite backend store shared by mcp + worker
      MLFLOW_TRACKING_URI: sqlite:////data/mlflow/mlflow.db
      MLFLOW_EXPERIMENT_NAME: yolo-auto

      # You should override these via an env file or environment:
      # - FEISHU_WEBHOOK_URL
      # - YOLO_SSH_ENVS or YOLO_SSH_HOST/PORT/USER/KEY_PATH
      YOLO_SSH_KEY_PATH: /run/secrets/yolo_ssh_key
    volumes:
      - state-data:/data/state
      - mlflow-data:/data/mlflow
    secrets:
      - yolo_ssh_key
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 10

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
    image: yolo-auto-app:latest
    restart: unless-stopped
    command: ["uv", "run", "yolo-auto-watch"]
    environment:
      YOLO_STATE_FILE: /data/state/jobs.json
      YOLO_WATCH_LOCK_FILE: /data/state/watch.lock
      YOLO_WATCH_POLL_INTERVAL_SECONDS: "30"

      MLFLOW_TRACKING_URI: sqlite:////data/mlflow/mlflow.db
      MLFLOW_EXPERIMENT_NAME: yolo-auto

      YOLO_SSH_KEY_PATH: /run/secrets/yolo_ssh_key
    volumes:
      - state-data:/data/state
      - mlflow-data:/data/mlflow
    secrets:
      - yolo_ssh_key
    depends_on:
      mcp:
        condition: service_healthy

  mlflow-ui:
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
    image: yolo-auto-app:latest
    restart: unless-stopped
    command:
      [
        "uv",
        "run",
        "mlflow",
        "ui",
        "--backend-store-uri",
        "sqlite:////data/mlflow/mlflow.db",
        "--port",
        "5001",
        "--host",
        "0.0.0.0"
      ]
    ports:
      - "5001:5001"
    volumes:
      - mlflow-data:/data/mlflow

volumes:
  state-data:
    driver: local
  mlflow-data:
    driver: local

secrets:
  # Create file at docker/secrets/yolo_ssh_key (or override with your own path).
  yolo_ssh_key:
    file: ./secrets/yolo_ssh_key

